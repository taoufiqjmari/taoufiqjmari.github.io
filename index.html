<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="./index.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap"
    />
    <title>Taoufiq Jmari</title>
    <link rel="icon" type="image/li-icon" href="./public/logo@2x.png" />
  </head>
  <body>
    <div class="desktop">
      <section class="header">
        <div class="logo-frame">
          <div class="title-frame">
            <img
              class="logo-icon"
              loading="eager"
              alt=""
              src="../public/logo@2x.png"
            />
          </div>
          <h1 class="title">Taoufiq Jmari</h1>
        </div>
        <div class="description">
          <span class="bold">Fullstack developer,</span>
          trained at
          <span class="bold">1337,</span>
          the best programming school in Morocco
        </div>
      </section>
      <section class="about-me-frame">
        <button class="email" id="email">
          <div class="container4"></div>
          <img class="email-icon" alt="" src="../public/email-icon@2x.png" />

          <b class="agriculture-section">Send me an email!</b>
        </button>
        <button class="follow" id="follow">
          <div class="container5"></div>
          <img class="sm-icon" alt="" src="../public/sm-icon@2x.png" />

          <b class="text">Connect with me online</b>
        </button>
      </section>
      <section class="what-we-do">
        <div class="service-frame">
          <b class="title2">What I Do</b>
        </div>
        <div class="header-frame">
          <img
            class="service-icon"
            loading="eager"
            alt=""
            src="../public/api.png"
          />
          <img
            class="service-icon1"
            loading="eager"
            alt=""
            src="../public/team.png"
          />
        </div>
      </section>
      <section class="icons">
        <img
          class="ts-icon"
          loading="eager"
          alt=""
          src="../public/ts-icon.png"
        />
        <img
          class="cpp-icon"
          loading="eager"
          alt=""
          src="../public/cpp-icon.png"
        />
        <img
          class="python-icon"
          loading="eager"
          alt=""
          src="../public/python-icon.png"
        />
        <img
          class="git-icon"
          loading="eager"
          alt=""
          src="../public/git-icon.png"
        />
        <img
          class="docker-icon"
          loading="eager"
          alt=""
          src="../public/docker-icon.png"
        />
      </section>
      <section class="about-me">
        <b class="title4">About Me</b>
        <div class="description2">
          <p class="about-inner">‣ I am easy to talk to</p>
          <p class="about-inner">
            ‣ Trained to adapt quickly to new technologies
          </p>
          <p class="about-inner">
            ‣ I work in a professional manner following best practices
          </p>
          <p class="about-inner">‣ I deliver high quality work</p>
        </div>
      </section>
      <section class="cool-projects-ive-done">
        <div class="title-wrapper">
          <b class="title3">Cool Projects I've Done</b>
        </div>
        <div class="project-parent">
          <img
            class="project-icon"
            loading="eager"
            alt=""
            src="./public/ft_transcendence_2.png"
            id="projectImage"
          />

          <img
            class="project-icon"
            loading="eager"
            alt=""
            src="./public/ecommerce_3.png"
            id="projectImage1"
          />
        </div>
      </section>
      <section class="icons" data-scroll-to="findMe">
        <img
          class="gh-icon"
          loading="eager"
          alt=""
          src="../public/gh-icon@2x.png"
          id="ghIconImage"
        />
        <img
          class="li-icon"
          loading="eager"
          alt=""
          src="../public/li-icon@2x.png"
          id="liIconImage"
        />
      </section>
    </div>

    <script>
      const email = document.getElementById('email');
      if (email) {
        email.addEventListener('click', function () {
          window.location.href = 'mailto:haani.agency@gmail.com';
        });
      }

      var follow = document.getElementById('follow');
      if (follow) {
        follow.addEventListener('click', function () {
          var anchor = document.querySelector("[data-scroll-to='findMe']");
          if (anchor) {
            anchor.scrollIntoView({ block: 'start', behavior: 'smooth' });
          }
        });
      }

      var projectImage = document.getElementById('projectImage');
      if (projectImage) {
        projectImage.addEventListener('click', function () {
          window.location.href = './project1.html';
        });
      }

      var projectImage1 = document.getElementById('projectImage1');
      if (projectImage1) {
        projectImage1.addEventListener('click', function () {
          window.location.href = './project2.html';
        });
      }

      var ttIconImage = document.getElementById('ghIconImage');
      if (ttIconImage) {
        ttIconImage.addEventListener('click', function () {
          window.open('https://github.com/taoufiqjmari');
        });
      }

      var xIconImage = document.getElementById('liIconImage');
      if (xIconImage) {
        xIconImage.addEventListener('click', function () {
          window.open('https://www.linkedin.com/in/taoufiqjmari/');
        });
      }
    </script>
  </body>
</html>
