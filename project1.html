<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="initial-scale=1, width=device-width" />

    <link rel="stylesheet" href="../global.css" />
    <link rel="stylesheet" href="./project.css" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;500;700&display=swap"
    />
    <title>Taoufiq Jmari</title>
    <link rel="icon" type="image/li-icon" href="../public/logo@2x.png" />
  </head>
  <body>
    <div class="project-page">
      <div class="main-frame">
        <div class="sub-frame">
          <button class="source-code" id="sourceCode">
            <div class="container11"></div>
            <img class="gh-icon" alt="" src="../public/gh-icon@2x.png" />

            <div class="preview-frame">
              <b class="label-frame">Source Code</b>
            </div>
          </button>
        </div>
        <button class="preview disabled" id="preview" disabled>
          <div class="container12"></div>
          <img
            class="preview-icon"
            alt=""
            src="../public/preview-icon@2x.png"
          />

          <b class="text-area">Preview</b>
        </button>
      </div>
      <main class="project">
        <b class="title6">Online Multiplayer Game</b>
        <section class="sub-frame1">
          <div class="image-frame">
            <div class="image-component">
              <img
                class="image-icon"
                loading="eager"
                alt=""
                src="./public/ft_transcendence_3.png"
              />
              <img
                class="image-icon"
                loading="eager"
                alt=""
                src="./public/ft_transcendence_5.png"
              />
              <img
                class="image-icon"
                loading="eager"
                alt=""
                src="./public/ft_transcendence_6.png"
              />
            </div>
            <div class="description3">
              <p class="description-inner">‣ Group project of 4 people</p>
              <p class="description-inner">
                ‣ Authentication using social login (Login with ...)
              </p>
              <p class="description-inner">‣ User data management</p>
              <p class="description-inner">‣ SQL database</p>
              <p class="description-inner">‣ Dockerization</p>
              <p class="description-inner">‣ Two-Factor Authentication</p>
              <p class="description-inner">
                ‣ Real time chatting and playing using WebSocket
              </p>
            </div>
          </div>
        </section>
      </main>
    </div>

    <script>
      var sourceCode = document.getElementById('sourceCode');
      if (sourceCode) {
        sourceCode.addEventListener('click', function () {
          window.open(
            'https://github.com/taoufiqjmari/1337-Common-Core/tree/main/ft_transcendence'
          );
        });
      }

      var preview = document.getElementById('preview');
      if (preview) {
        preview.addEventListener('click', function () {
          window.open('/preview.html');
        });
      }
    </script>
  </body>
</html>
